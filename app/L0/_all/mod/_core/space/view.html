<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/space/space.css" />
  </head>
  <body>
    <section class="space-panel space-view">
      <div class="space-card space-info-card space-view-card">
        <header class="space-view-header">
          <div>
            <p class="page-eyebrow">Space</p>
            <h1 x-text="$router.getParam('mode', '') === 'new' ? 'New Space' : 'Space'"></h1>
          </div>
          <button type="button" class="secondary-button" @click="$router.goTo('dashboard')">
            <x-icon>arrow_back</x-icon>
            <span>Dashboard</span>
          </button>
        </header>

        <div class="space-view-copy">
          <p>
            This view was resolved by the main router from the current hash path. Query params stay attached to the
            routed view and are exposed through <code>$router.current.params</code>.
          </p>
        </div>

        <div class="space-view-meta">
          <p>Route path: <code x-text="$router.current.path"></code></p>
          <p>Resolved view: <code x-text="$router.current.viewPath"></code></p>
          <template x-if="$router.current.search">
            <p>Route params: <code x-text="$router.current.search"></code></p>
          </template>
        </div>
      </div>
    </section>
  </body>
</html>
